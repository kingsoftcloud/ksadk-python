name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "open-source/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run focused tests
        run: uv run --extra dev pytest tests/test_open_source_audit.py tests/test_open_source_docs_contract.py tests/test_runtime_common_packaging.py -q

      - name: Audit public repository candidate
        run: uv run --extra dev python scripts/open_source_audit.py --target public-repo

      - name: Build and audit public docs
        run: make public-docs-audit

      - name: Build package artifacts
        run: uv build

      - name: Check package metadata
        run: uv run --extra dev python -m twine check dist/*
