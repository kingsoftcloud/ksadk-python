name: Secret Pattern Audit

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "open-source/**"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run open-source content audit
        run: python3 scripts/open_source_audit.py --target public-repo
